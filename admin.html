<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:white; }
.glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); }
.input { background:#111; border:1px solid #333; padding:10px; width:100%; border-radius:10px; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">

<!-- LOGIN -->
<div id="loginBox" class="w-full max-w-md glass p-8 rounded-2xl">
    <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>

    <input id="email" type="email" placeholder="Email" class="input mb-4">
    <input id="password" type="password" placeholder="Password" class="input mb-4">

    <button id="loginBtn" class="w-full bg-purple-600 py-3 rounded-xl">
        Login
    </button>

    <p id="loginError" class="text-red-400 mt-3 hidden"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden w-full max-w-lg glass p-8 rounded-2xl">

    <div class="flex justify-between mb-6">
        <h2 class="text-2xl font-bold">Add Project</h2>
        <button id="logoutBtn" class="text-red-400">Logout</button>
    </div>

    <p id="success" class="text-green-400 hidden mb-3">Added successfully</p>
    <p id="error" class="text-red-400 hidden mb-3"></p>

    <input id="title" placeholder="Title" class="input mb-3">
    <textarea id="description" placeholder="Description" class="input mb-3"></textarea>
    <input id="live_url" placeholder="Live URL" class="input mb-3">
    <input type="file" id="image" class="input mb-4">

    <button id="publishBtn" class="w-full bg-purple-600 py-3 rounded-xl">
        Publish
    </button>

</div>

<script type="module">
import { supabase } from './supabase.js';

// AUTO LOGIN CHECK
const { data } = await supabase.auth.getUser();
if (data.user) showDashboard();

// LOGIN
document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { error } = await supabase.auth.signInWithPassword({
        email, password
    });

    if (error) {
        showError('loginError', error.message);
    } else {
        showDashboard();
    }
};

// LOGOUT
document.getElementById('logoutBtn').onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
};

// SHOW DASHBOARD
function showDashboard() {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
}

// ADD PROJECT
document.getElementById('publishBtn').onclick = async () => {
    hideMsg();

    const file = document.getElementById('image').files[0];
    if (!file) return showError('error', 'Select image');

    const fileName = Date.now() + "-" + file.name;

    // Upload
    const { error: uploadError } = await supabase.storage
        .from("projects")
        .upload(fileName, file);

    if (uploadError) return showError('error', uploadError.message);

    const { data: urlData } = supabase.storage
        .from("projects")
        .getPublicUrl(fileName);

    // Insert
    const { error } = await supabase.from("projects").insert([{
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        live_url: document.getElementById('live_url').value,
        image_url: urlData.publicUrl
    }]);

    if (error) return showError('error', error.message);

    document.getElementById('success').classList.remove('hidden');
};

// HELPERS
function showError(id, msg) {
    const el = document.getElementById(id);
    el.innerText = msg;
    el.classList.remove('hidden');
}

function hideMsg() {
    document.getElementById('error').classList.add('hidden');
    document.getElementById('success').classList.add('hidden');
}

</script>

</body>
</html>
