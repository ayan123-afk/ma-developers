<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Admin Dashboard | Portfolio</title> <script src="https://cdn.tailwindcss.com"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"> <script> tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { primary: '#8b5cf6' } } } } </script> <style> body { background-color: #050505; color: #ffffff; } .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); } .input-field { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; } .input-field:focus { outline: none; border-color: #8b5cf6; } input[type="file"]::file-selector-button { background-color: #8b5cf6; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; margin-right: 1rem; } </style> </head> <body class="antialiased min-h-screen flex items-center justify-center p-6 relative"> <div class="w-full max-w-lg glass rounded-3xl p-8 relative z-10"> <div class="flex justify-between items-center mb-6"> <h1 class="text-3xl font-bold">Add Project</h1> <a href="index.html" class="text-gray-400 hover:text-white"><i class="fas fa-home text-xl"></i></a> </div> <!-- SUCCESS ALERT --> <div id="success-box" class="hidden mb-6 bg-green-500/10 border border-green-500/50 text-green-400 px-4 py-3 rounded-lg text-sm"> <i class="fas fa-check-circle mr-2"></i> Successfully published! </div> <!-- ERROR ALERT --> <div id="error-box" class="hidden mb-6 bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm break-words"> <i class="fas fa-exclamation-triangle mr-2"></i> <span id="error-message">Error</span> </div> <form id="add-form" class="space-y-5"> <div> <label class="block text-sm text-gray-400 mb-1">Title</label> <input type="text" id="title" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="Project Name"> </div> <div> <label class="block text-sm text-gray-400 mb-1">Description</label> <textarea id="description" required rows="3" class="input-field w-full px-4 py-3 rounded-xl" placeholder="Project details..."></textarea> </div> <div> <label class="block text-sm text-gray-400 mb-1">Live URL</label> <input type="url" id="live_url" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="https://..."> </div> <div> <label class="block text-sm text-gray-400 mb-1">Image Cover</label> <input type="file" id="image" accept="image/*" required class="input-field w-full px-4 py-2 rounded-xl text-gray-400"> </div> <button type="submit" id="submit-btn" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all mt-4"> Publish Project </button> </form> </div> <script type="module"> import { uploadImage, addProject } from './supabase.js'; const form = document.getElementById('add-form'); const submitBtn = document.getElementById('submit-btn'); const successBox = document.getElementById('success-box'); const errorBox = document.getElementById('error-box'); const errorMsg = document.getElementById('error-message'); form.addEventListener('submit', async (e) => { e.preventDefault(); // Reset UI successBox.classList.add('hidden'); errorBox.classList.add('hidden'); submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Uploading Image...'; submitBtn.disabled = true; submitBtn.classList.add('opacity-50'); try { const file = document.getElementById('image').files[0]; if (!file) throw new Error("Please select an image file."); // 1. Upload Image const uploadRes = await uploadImage(file); if (!uploadRes.success) throw new Error("Image Upload Error: " + uploadRes.error); // 2. Insert to Database submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving to Database...'; const projectData = { title: document.getElementById('title').value, description: document.getElementById('description').value, live_url: document.getElementById('live_url').value, image_url: uploadRes.url }; const dbRes = await addProject(projectData); if (!dbRes.success) throw new Error("Database Error: " + dbRes.error); // 3. Success form.reset(); successBox.classList.remove('hidden'); } catch (error) { // Show Error errorMsg.innerText = error.message; errorBox.classList.remove('hidden'); } finally { // Restore Button submitBtn.innerHTML = 'Publish Project'; submitBtn.disabled = false; submitBtn.classList.remove('opacity-50'); } }); </script> </body> </html>
