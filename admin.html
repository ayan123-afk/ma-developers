<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:white; }
.glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); }
.input { background:#111; border:1px solid #333; padding:10px; width:100%; border-radius:10px; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">

<div class="w-full max-w-lg glass p-8 rounded-2xl">

<div class="flex justify-between mb-6">
<h2 class="text-2xl font-bold">Add Project</h2>
<button id="logoutBtn" class="text-red-400">Logout</button>
</div>

<p id="success" class="text-green-400 hidden mb-3">Added successfully</p>
<p id="error" class="text-red-400 hidden mb-3"></p>

<input id="title" placeholder="Title" class="input mb-3">
<textarea id="description" placeholder="Description" class="input mb-3"></textarea>
<input id="live_url" placeholder="Live URL" class="input mb-3">
<input type="file" id="image" class="input mb-4">

<button id="publishBtn" class="w-full bg-purple-600 py-3 rounded-xl">
Publish
</button>

</div>

<script type="module">
import { getSession, logout, uploadImage, addProject } from './supabase.js';

// PROTECT PAGE
const session = await getSession();
if (!session) {
    window.location.href = "login.html";
}

// LOGOUT
document.getElementById('logoutBtn').onclick = async () => {
    await logout();
    window.location.href = "login.html";
};

// ADD PROJECT
document.getElementById('publishBtn').onclick = async () => {

    hideMsg();

    const file = document.getElementById('image').files[0];
    if (!file) return showError("Select image");

    const uploadRes = await uploadImage(file);
    if (!uploadRes.success) return showError(uploadRes.error);

    const dbRes = await addProject({
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        live_url: document.getElementById('live_url').value,
        image_url: uploadRes.url
    });

    if (!dbRes.success) return showError(dbRes.error);

    document.getElementById('success').classList.remove('hidden');
};

// HELPERS
function showError(msg) {
    const el = document.getElementById('error');
    el.innerText = msg;
    el.classList.remove('hidden');
}

function hideMsg() {
    document.getElementById('error').classList.add('hidden');
    document.getElementById('success').classList.add('hidden');
}
</script>

</body>
</html>
