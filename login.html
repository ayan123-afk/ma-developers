<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen">

<div class="bg-white/5 p-8 rounded-2xl w-96 text-white">

<h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>

<input id="email" type="email" placeholder="Email"
class="w-full mb-4 p-3 rounded bg-black border border-gray-700">

<input id="password" type="password" placeholder="Password"
class="w-full mb-4 p-3 rounded bg-black border border-gray-700">

<button id="loginBtn"
class="w-full bg-purple-600 py-3 rounded font-bold">
Login
</button>

<p id="error" class="text-red-400 mt-3 hidden"></p>

</div>

<script type="module">
import { login, getSession } from './supabase.js';

// AUTO LOGIN CHECK
const session = await getSession();
if (session) window.location.href = "admin.html";

document.getElementById('loginBtn').onclick = async () => {

    const res = await login(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value.trim()
    );

    if (!res.success) {
        const error = document.getElementById('error');
        error.innerText = res.error;
        error.classList.remove('hidden');
    } else {
        window.location.href = "admin.html";
    }
};
</script>

</body>
</html>
